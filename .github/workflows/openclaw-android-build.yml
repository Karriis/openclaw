name: OpenClaw Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd apps/android
          chmod +x ./gradlew
          ./gradlew :app:assemblePlayDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-debug.apk
          path: apps/android/app/build/outputs/apk/play/debug/*.apk
